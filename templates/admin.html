<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - KitPc</title>
    <link rel="icon" href="{{ url_for('static', filename='Imagens/favicon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/admin.css') }}">
</head>
<body>

    <div class="container admin-container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="text-center mb-4">
                    <h1 class="display-5">PAINEL ADM</h1>
                    <p class="text-info">GERENCIADOR DE CONTEÚDO DO BLOG</p>
                </div>

                <div class="card card-admin">
                    <div class="card-header-admin text-center">
                        <h3>NOVA MATÉRIA</h3>
                    </div>
                    <div class="card-body p-4">
                        <form action="/admin/salvar-post" method="POST">
                            
                            <div class="mb-3">
                                <label>Título do Artigo</label>
                                <input type="text" name="titulo" class="form-control" placeholder="Ex: Guia de Overclock" required>
                            </div>

                            <div class="mb-3">
                                <label>Resumo (Subtítulo)</label>
                                <input type="text" name="subtitulo" class="form-control" placeholder="Breve descrição para atrair cliques">
                            </div>

                            <div class="mb-3">
                                <label>Link da Imagem (URL)</label>
                                <input type="url" name="imagem_url" class="form-control" placeholder="https://imgur.com/foto-pc.png">
                            </div>

                            <div class="mb-4">
                                <label>Conteúdo da Matéria</label>
                                <textarea name="conteudo" class="form-control" rows="10" placeholder="Escreva aqui o seu conhecimento..."></textarea>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-cyber">PUBLICAR NO SISTEMA</button>
                                <a href="/" class="btn btn-link text-secondary text-decoration-none text-center mt-2">CANCELAR E VOLTAR</a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
